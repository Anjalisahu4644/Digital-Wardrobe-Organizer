<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Digital Wardrobe Organizer - Organize clothes, build outfits, get smart suggestions"
    />
    <meta name="theme-color" content="#6C5CE7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Digital Wardrobe Organizer</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- ============ AUTH SCREEN ============ -->
    <div id="auth-screen">
      <div class="auth-container">
        <div class="auth-logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect
              x="8"
              y="6"
              width="32"
              height="36"
              rx="4"
              stroke="url(#g1)"
              stroke-width="2.5"
              fill="none"
            />
            <path
              d="M18 6V4a6 6 0 0 1 12 0v2"
              stroke="url(#g1)"
              stroke-width="2.5"
              fill="none"
              stroke-linecap="round"
            />
            <line
              x1="16"
              y1="18"
              x2="32"
              y2="18"
              stroke="url(#g1)"
              stroke-width="2"
              stroke-linecap="round"
            />
            <line
              x1="16"
              y1="24"
              x2="28"
              y2="24"
              stroke="url(#g1)"
              stroke-width="2"
              stroke-linecap="round"
            />
            <line
              x1="16"
              y1="30"
              x2="24"
              y2="30"
              stroke="url(#g1)"
              stroke-width="2"
              stroke-linecap="round"
            />
            <defs>
              <linearGradient id="g1" x1="0" y1="0" x2="48" y2="48">
                <stop stop-color="#6C5CE7" />
                <stop offset="1" stop-color="#00CEC9" />
              </linearGradient>
            </defs>
          </svg>
          <h1>Digital Wardrobe</h1>
          <p class="auth-subtitle">Your personal style assistant</p>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form active" autocomplete="off">
          <h2>Welcome Back</h2>
          <div class="input-group">
            <label for="login-username">Username</label>
            <input
              type="text"
              id="login-username"
              placeholder="Enter username"
              required
            />
          </div>
          <div class="input-group">
            <label for="login-password">Password</label>
            <input
              type="password"
              id="login-password"
              placeholder="Enter password"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="login-btn">
            Sign In
          </button>
          <p class="auth-switch">
            <a href="#" id="show-reset-password">Forgot password?</a>
          </p>
          <p class="auth-switch">
            Don't have an account? <a href="#" id="show-register">Create one</a>
          </p>
          <div id="login-error" class="auth-error"></div>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="auth-form" autocomplete="off">
          <h2>Create Account</h2>
          <div class="input-group">
            <label for="reg-name">Full Name</label>
            <input type="text" id="reg-name" placeholder="Your name" required />
          </div>
          <div class="input-group">
            <label for="reg-username">Username</label>
            <input
              type="text"
              id="reg-username"
              placeholder="Choose username"
              required
            />
          </div>
          <div class="input-group">
            <label for="reg-password">Password</label>
            <input
              type="password"
              id="reg-password"
              placeholder="Create password"
              required
              minlength="4"
            />
          </div>
          <button
            type="submit"
            class="btn btn-primary btn-full"
            id="register-btn"
          >
            Create Account
          </button>
          <p class="auth-switch">
            Already have an account? <a href="#" id="show-login">Sign in</a>
          </p>
          <div id="register-error" class="auth-error"></div>
        </form>
      </div>
    </div>

    <!-- ============ MAIN APP ============ -->
    <div id="app" class="hidden">
      <!-- Sidebar / Navigation -->
      <nav id="sidebar">
        <div class="sidebar-header">
          <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
            <rect
              x="8"
              y="6"
              width="32"
              height="36"
              rx="4"
              stroke="url(#g2)"
              stroke-width="2.5"
              fill="none"
            />
            <path
              d="M18 6V4a6 6 0 0 1 12 0v2"
              stroke="url(#g2)"
              stroke-width="2.5"
              fill="none"
              stroke-linecap="round"
            />
            <defs>
              <linearGradient id="g2" x1="0" y1="0" x2="48" y2="48">
                <stop stop-color="#6C5CE7" />
                <stop offset="1" stop-color="#00CEC9" />
              </linearGradient>
            </defs>
          </svg>
          <span class="sidebar-title">Wardrobe</span>
        </div>
        <ul class="nav-links">
          <li>
            <a
              href="#"
              data-page="dashboard"
              class="nav-link active"
              id="nav-dashboard"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="3" width="7" height="7" rx="1" />
                <rect x="14" y="3" width="7" height="7" rx="1" />
                <rect x="3" y="14" width="7" height="7" rx="1" />
                <rect x="14" y="14" width="7" height="7" rx="1" />
              </svg>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a href="#" data-page="wardrobe" class="nav-link" id="nav-wardrobe">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M20.38 3.46L16.01 2H8L3.62 3.46A2 2 0 0 0 2 5.34V21a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1V5.34a2 2 0 0 0-1.62-1.88z"
                />
                <line x1="12" y1="2" x2="12" y2="22" />
              </svg>
              <span>My Wardrobe</span>
            </a>
          </li>
          <li>
            <a href="#" data-page="outfits" class="nav-link" id="nav-outfits">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                <line x1="3" y1="6" x2="21" y2="6" />
                <path d="M16 10a4 4 0 0 1-8 0" />
              </svg>
              <span>Outfits</span>
            </a>
          </li>
          <li>
            <a
              href="#"
              data-page="suggestions"
              class="nav-link"
              id="nav-suggestions"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="12" cy="12" r="5" />
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
              </svg>
              <span>Suggestions</span>
            </a>
          </li>
          <li>
            <a
              href="#"
              data-page="analytics"
              class="nav-link"
              id="nav-analytics"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="18" y1="20" x2="18" y2="10" />
                <line x1="12" y1="20" x2="12" y2="4" />
                <line x1="6" y1="20" x2="6" y2="14" />
              </svg>
              <span>Analytics</span>
            </a>
          </li>
        </ul>
        <div class="sidebar-footer">
          <div class="user-info" id="user-info">
            <div class="user-avatar" id="user-avatar">U</div>
            <span class="user-name" id="user-name">User</span>
          </div>
          <button
            class="btn-icon"
            id="change-password-btn"
            title="Change Password"
          >
            🔒
          </button>
          <button class="btn-icon" id="logout-btn" title="Logout">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
          </button>
        </div>
      </nav>

      <!-- Mobile Bottom Nav -->
      <nav id="mobile-nav">
        <a
          href="#"
          data-page="dashboard"
          class="mob-link active"
          id="mob-dashboard"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="3" width="7" height="7" rx="1" />
            <rect x="14" y="3" width="7" height="7" rx="1" />
            <rect x="3" y="14" width="7" height="7" rx="1" />
            <rect x="14" y="14" width="7" height="7" rx="1" />
          </svg>
          <span>Home</span>
        </a>
        <a href="#" data-page="wardrobe" class="mob-link" id="mob-wardrobe">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M20.38 3.46L16.01 2H8L3.62 3.46A2 2 0 0 0 2 5.34V21a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1V5.34a2 2 0 0 0-1.62-1.88z"
            />
            <line x1="12" y1="2" x2="12" y2="22" />
          </svg>
          <span>Wardrobe</span>
        </a>
        <a href="#" data-page="outfits" class="mob-link" id="mob-outfits">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <path d="M16 10a4 4 0 0 1-8 0" />
          </svg>
          <span>Outfits</span>
        </a>
        <a href="#" data-page="suggestions" class="mob-link" id="mob-suggest">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
          </svg>
          <span>Suggest</span>
        </a>
        <a href="#" data-page="analytics" class="mob-link" id="mob-analytics">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <line x1="18" y1="20" x2="18" y2="10" />
            <line x1="12" y1="20" x2="12" y2="4" />
            <line x1="6" y1="20" x2="6" y2="14" />
          </svg>
          <span>Stats</span>
        </a>
      </nav>

      <!-- Main Content Area -->
      <main id="main-content">
        <div id="page-content"></div>
      </main>
    </div>

    <!-- ============ MODAL OVERLAY ============ -->
    <div id="modal-overlay" class="hidden">
      <div id="modal-box">
        <button class="modal-close" id="modal-close">&times;</button>
        <div id="modal-content"></div>
      </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <!-- Hidden canvas for image processing -->
    <canvas id="hidden-canvas" style="display: none"></canvas>

    <!-- Scripts -->
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/wardrobe.js"></script>
    <script src="js/outfits.js"></script>
    <script src="js/suggestions.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
